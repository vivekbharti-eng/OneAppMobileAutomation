name: Appium Mobile Automation Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to run tests'
        required: true
        default: 'android'
        type: choice
        options:
          - android
          - ios
      execution_type:
        description: 'Execution type'
        required: true
        default: 'browserstack'
        type: choice
        options:
          - local
          - browserstack
      test_tags:
        description: 'Test tags to run'
        required: true
        default: '@smoke'
        type: choice
        options:
          - '@smoke'
          - '@regression'
          - '@smoke or @regression'

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        platform: [android]
        execution_type: [browserstack]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: maven
    
    - name: Cache Maven packages
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2
    
    - name: Set platform and execution type
      run: |
        echo "PLATFORM=${{ github.event.inputs.platform || matrix.platform }}" >> $GITHUB_ENV
        echo "EXECUTION_TYPE=${{ github.event.inputs.execution_type || matrix.execution_type }}" >> $GITHUB_ENV
        echo "TEST_TAGS=${{ github.event.inputs.test_tags || '@smoke' }}" >> $GITHUB_ENV
    
    - name: Display configuration
      run: |
        echo "Platform: ${{ env.PLATFORM }}"
        echo "Execution Type: ${{ env.EXECUTION_TYPE }}"
        echo "Test Tags: ${{ env.TEST_TAGS }}"
    
    - name: Run tests
      env:
        BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
        BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
      run: |
        mvn clean test -P${{ env.EXECUTION_TYPE }}-${{ env.PLATFORM }} \
          -Dcucumber.filter.tags="${{ env.TEST_TAGS }}"
    
    - name: Generate Allure Report
      if: always()
      run: mvn allure:report
    
    - name: Upload Extent Reports
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: extent-reports-${{ env.PLATFORM }}-${{ env.EXECUTION_TYPE }}
        path: target/reports/
        retention-days: 30
    
    - name: Upload Screenshots
      if: failure()
      uses: actions/upload-artifact@v3
      with:
        name: screenshots-${{ env.PLATFORM }}-${{ env.EXECUTION_TYPE }}
        path: target/screenshots/
        retention-days: 30
    
    - name: Upload Cucumber Reports
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: cucumber-reports-${{ env.PLATFORM }}-${{ env.EXECUTION_TYPE }}
        path: target/cucumber-reports/
        retention-days: 30
    
    - name: Upload Allure Results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: allure-results-${{ env.PLATFORM }}-${{ env.EXECUTION_TYPE }}
        path: target/allure-results/
        retention-days: 30
    
    - name: Publish Test Results
      if: always()
      uses: EnricoMi/publish-unit-test-result-action@v2
      with:
        files: target/cucumber-reports/cucumber.xml
    
    - name: Comment PR with results
      if: github.event_name == 'pull_request' && always()
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          const reportPath = 'target/cucumber-reports/cucumber.json';
          
          if (fs.existsSync(reportPath)) {
            const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
            
            let passed = 0, failed = 0, skipped = 0;
            
            report.forEach(feature => {
              feature.elements.forEach(scenario => {
                scenario.steps.forEach(step => {
                  if (step.result.status === 'passed') passed++;
                  else if (step.result.status === 'failed') failed++;
                  else if (step.result.status === 'skipped') skipped++;
                });
              });
            });
            
            const comment = `## 🧪 Test Results
            
            **Platform:** ${{ env.PLATFORM }}
            **Execution Type:** ${{ env.EXECUTION_TYPE }}
            
            | Status | Count |
            |--------|-------|
            | ✅ Passed | ${passed} |
            | ❌ Failed | ${failed} |
            | ⏭️ Skipped | ${skipped} |
            
            **Total:** ${passed + failed + skipped} steps`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
          }
    
    - name: Send Slack notification
      if: always()
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        text: |
          Appium Tests ${{ job.status }}
          Platform: ${{ env.PLATFORM }}
          Execution: ${{ env.EXECUTION_TYPE }}
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
