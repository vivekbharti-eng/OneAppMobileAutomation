name: Mobile Test Automation - EcoCash

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC
  workflow_dispatch:  # Manual trigger

jobs:
  test-android-smoke-browserstack:
    name: Android Smoke Tests (BrowserStack)
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    
    - name: Run Android Smoke Tests
      env:
        BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
        BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
      run: |
        mvn clean test -Pbs-android -Dcucumber.filter.tags="@smoke"
    
    - name: Generate Allure Report
      if: always()
      run: mvn allure:report
    
    - name: Upload Test Reports
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: android-smoke-reports
        path: |
          target/reports/
          target/cucumber-reports/
          target/allure-results/
          target/surefire-reports/
    
    - name: Upload Screenshots
      if: failure()
      uses: actions/upload-artifact@v3
      with:
        name: android-smoke-screenshots
        path: target/screenshots/

  test-android-regression-browserstack:
    name: Android Regression Tests (BrowserStack)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    
    - name: Run Android Regression Tests
      env:
        BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
        BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
      run: |
        mvn clean test -Pbs-android -Dcucumber.filter.tags="@regression"
    
    - name: Upload Test Reports
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: android-regression-reports
        path: |
          target/reports/
          target/cucumber-reports/
          target/allure-results/

  test-ios-smoke-browserstack:
    name: iOS Smoke Tests (BrowserStack)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    
    - name: Run iOS Smoke Tests
      env:
        BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
        BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
      run: |
        mvn clean test -Pbs-ios -Dcucumber.filter.tags="@smoke"
    
    - name: Upload Test Reports
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: ios-smoke-reports
        path: |
          target/reports/
          target/cucumber-reports/
          target/allure-results/
    
    - name: Upload Screenshots
      if: failure()
      uses: actions/upload-artifact@v3
      with:
        name: ios-smoke-screenshots
        path: target/screenshots/

  publish-reports:
    name: Publish Test Reports
    runs-on: ubuntu-latest
    needs: [test-android-smoke-browserstack]
    if: always()
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Download Android Smoke Reports
      uses: actions/download-artifact@v3
      with:
        name: android-smoke-reports
        path: reports/android-smoke
    
    - name: Publish Allure Report
      uses: simple-elf/allure-report-action@master
      if: always()
      with:
        allure_results: reports/android-smoke/allure-results
        allure_report: allure-report
        gh_pages: gh-pages
        allure_history: allure-history
    
    - name: Deploy to GitHub Pages
      if: always()
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_branch: gh-pages
        publish_dir: allure-report

  notify-slack:
    name: Notify Slack
    runs-on: ubuntu-latest
    needs: [test-android-smoke-browserstack, test-android-regression-browserstack, test-ios-smoke-browserstack]
    if: always()
    
    steps:
    - name: Send Slack Notification
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        text: |
          EcoCash Mobile Test Automation
          Event: ${{ github.event_name }}
          Branch: ${{ github.ref }}
          Status: ${{ job.status }}
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
      if: always() && secrets.SLACK_WEBHOOK != ''
