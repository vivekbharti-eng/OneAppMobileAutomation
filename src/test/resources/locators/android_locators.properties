sendmoney.pin.submit.xpath=//*[@content-desc='Pay' or @text='Pay'] | //*[@content-desc='Submit' or @text='Submit'] | //*[@content-desc='Confirm' or @text='Confirm'] | //*[@content-desc='Done' or @text='Done']

# Step 9 - Confirmation / review bottom drawer
