# Step 1 - Send Money tile on Home / Pay page
# Use * wildcard to match any element type (View, Button, TextView)
sendmoney.button.xpath=//*[@content-desc='Send Money' or @text='Send Money'] | //*[contains(@content-desc,'Send Money')] | //android.widget.TextView[contains(@text,'Send Money')]

# Step 2 - Bottom drawer: Send option (appears after tapping Send Money)
sendmoney.drawer.send.xpath=//*[@content-desc='Send' or @text='Send'] | //*[@content-desc='Transfer' or @text='Transfer']

# Step 3 - Mobile search field and contact result
# Note: EcoCash renders the search field as android.widget.ImageView (React Native TextInput) with resource-id='search_textfield'
sendmoney.search.field.xpath=//android.widget.ImageView[@resource-id='search_textfield'] | //android.widget.EditText
sendmoney.contact.result.xpath=//*[contains(@text,'777222015') or contains(@content-desc,'777222015')]
sendmoney.contact.result.dynamic.xpath=//*[contains(@text,'%s') or contains(@content-desc,'%s')]
sendmoney.no.contact.xpath=//*[contains(@text,'No results') or contains(@text,'not found') or contains(@text,'No contact') or contains(@text,'No user') or contains(@content-desc,'No results')]

# Step 4 - Currency selector (tab buttons on currency screen)
sendmoney.currency.usd.xpath=//*[@content-desc='USD' or @text='USD'] | //*[contains(@content-desc,'US Dollar') or contains(@text,'US Dollar')] | //*[contains(@content-desc,'USD')]
sendmoney.currency.zwg.xpath=//*[@content-desc='ZWG' or @text='ZWG'] | //*[contains(@content-desc,'Zimbabwe') or contains(@text,'Zimbabwe')] | //*[contains(@content-desc,'ZWG')]
