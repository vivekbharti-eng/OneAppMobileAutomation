# ==========================================
# PLATFORM CONFIGURATION
# ==========================================
# Options: android, ios
platform=android

# ==========================================
# EXECUTION TYPE CONFIGURATION
# ==========================================
# Options: local, browserstack
execution.type=local

# ==========================================
# APPIUM SERVER CONFIGURATION
# ==========================================
appium.server.url=http://127.0.0.1:4723

# ==========================================
# ANDROID CONFIGURATION
# ==========================================
# Device Type: emulator or real
android.deviceType=real

# For Emulator
android.deviceName=Pixel 7
android.platformVersion=14.0

# For Real Device (Get UDID from 'adb devices')
android.udid=10BF7S243X0030Z

android.automationName=UiAutomator2
android.app=C:/Users/vivek.bharti/Downloads/EcoCash Preprod (2).apk
android.appPackage=com.sasai.sasaipay
android.appActivity=com.sasai.sasaipay.MainActivity
android.noReset=true
android.fullReset=false

# Real Device Specific Settings
android.skipDeviceInitialization=false
android.skipServerInstallation=false
# systemPort is left unset so UiAutomator2 auto-selects an available port (avoids port 8200 TIME_WAIT conflicts)
# android.systemPort=8200

# ==========================================
# iOS CONFIGURATION
# ==========================================
# Device Type: simulator or real
ios.deviceType=simulator

# For Simulator
ios.deviceName=iPhone 15
ios.platformVersion=17.0

# For Real Device (Get UDID from 'xcrun xctrace list devices' or Xcode)
ios.udid=

ios.automationName=XCUITest
ios.app=C:/apps/ios/app.app
ios.bundleId=com.example.app
ios.noReset=false
ios.fullReset=false

# Real Device Specific Settings (Required for iOS Real Device)
ios.xcodeOrgId=
ios.xcodeSigningId=iPhone Developer
ios.updatedWDABundleId=com.yourcompany.WebDriverAgentRunner
ios.useNewWDA=false
ios.wdaLocalPort=8100

# ==========================================
# COMMON CAPABILITIES
# ==========================================
newCommandTimeout=300
autoGrantPermissions=true
autoAcceptAlerts=true

# ==========================================
# TEST CREDENTIALS
# ==========================================
# NOTE: Positive test data has been moved to feature-specific testdata files:
#   src/test/resources/testdata/login.properties
#   src/test/resources/testdata/logout.properties
#   src/test/resources/testdata/sendmoney.properties
#
# Values below kept as legacy fallback only.
country.code=+263
mobile.number=789124766
otp=123456
pin=4827

# Send Money (P2P) test data (legacy fallback)
sendmoney.recipient=773100200
sendmoney.amount=1.00

# Legacy credentials (if needed)
username=testuser@example.com
password=Test@123

# ==========================================
# TIMEOUTS (in seconds)
# ==========================================
implicit.wait=10
explicit.wait=20
page.load.timeout=30

# ==========================================
# TEST EXECUTION
# ==========================================
# Exit immediately on first test failure (true/false)
fail.fast=false

# ==========================================
# REPORTING
# ==========================================
# Report directories are now auto-generated with timestamps
# Structure: target/reports/{report-type}/{timestamp}/
# - Extent Reports: target/reports/extent/{timestamp}/ExtentReport_{timestamp}.html
# - Allure Results: target/reports/allure/{timestamp}/allure-results/
# Note: screenshot.path remains in root target/screenshots/ for easy access
screenshot.path=target/screenshots/
# ==========================================
# EMAIL REPORT CONFIGURATION
# ==========================================
# Set email.enabled=true to send report email after each suite run
email.enabled=true

# SMTP server settings (update for your mail provider)
# Gmail example: smtp.gmail.com port 587 (requires App Password, not account password)
# Corporate SMTP: update host/port to match your server
email.smtp.host=smtp.gmail.com
email.smtp.port=587
email.smtp.username=your-sender@gmail.com
email.smtp.password=your-app-password
email.from=your-sender@gmail.com

# Comma-separated recipient list
email.to=vivek.bharti@kellton.com

# ==========================================
# BROWSERSTACK CONFIGURATION
# ==========================================
# BrowserStack Hub URL
browserstack.url=https://hub-cloud.browserstack.com/wd/hub

# BrowserStack Credentials (Use environment variables in CI/CD)
browserstack.username=your_username
browserstack.accessKey=your_access_key

# BrowserStack Project Configuration
browserstack.project=OneApp Automation Framework
browserstack.build=Build-1.0
browserstack.sessionName=Test Session

# BrowserStack App URLs (Upload your app to BrowserStack and use the app URL)
browserstack.android.app=bs://your_android_app_id
browserstack.ios.app=bs://your_ios_app_id

# BrowserStack Device Configuration - Android
browserstack.android.device=Google Pixel 7
browserstack.android.osVersion=13.0

# BrowserStack Device Configuration - iOS
browserstack.ios.device=iPhone 14
browserstack.ios.osVersion=16

# BrowserStack Additional Capabilities
browserstack.debug=true
browserstack.networkLogs=true
browserstack.video=true
browserstack.local=false
browserstack.acceptSslCerts=true
browserstack.timezone=UTC